# Render Blueprint — deploys the whole Helios app (FastAPI serves both the API and
# the frontend dashboard) as a single web service.
#
# Deploy: Render dashboard -> New -> Blueprint -> pick this repo. Render reads this
# file and configures everything. The trained models ship via Git LFS (see
# .gitattributes); Render fetches LFS objects automatically at build.
#
# MEMORY NOTE: three live variants now exist (22+78+77 MB on disk, 2-3x in RAM);
# sharp_live keeps only ONE loaded at a time (LRU eviction), which keeps the
# 512MB free tier viable. If the service still restarts under load, bump `plan`
# to `starter` (more RAM). Storm model is tiny.
#
# PROSPECTIVE RECORD: this deploy has NO persistent disk and the free tier
# sleeps when idle — notify.db + prediction_history.csv reset on every deploy
# and the notifier loop pauses while asleep. The CANONICAL prospective forecast
# record accumulates on the local always-on machine and is committed to the
# repo; treat this deploy as a demo mirror, not the record of evidence.
services:
  - type: web
    name: helios-solar-flare
    runtime: python
    plan: free                # -> change to `starter` if the models OOM the free tier
    region: oregon            # pick the region closest to you
    buildCommand: pip install -r requirements-server.txt
    startCommand: uvicorn api.server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    # Manual deploys only ("Deploy latest commit" in the Render dashboard, per
    # milestone). Auto-deploy on every push re-fetched ~170MB of Git-LFS models
    # each time — the free LFS bandwidth quota is 1GB/MONTH — and wiped the
    # ephemeral disk (see PROSPECTIVE RECORD above).
    autoDeploy: false
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      # DEMO_MODE: this deploy is a demo mirror, not the record of evidence. It
      # therefore does NOT run the notifier loop (which would write a second,
      # ephemeral, wiped-on-restart forecast log that diverges from the truth)
      # and instead serves the git-committed prediction_history.csv — the
      # canonical prospective record maintained by the scheduled GitHub Actions
      # runner (.github/workflows/notify.yml). See PROSPECTIVE RECORD above.
      - key: HELIOS_DEMO_MODE
        value: "1"
      # Optional: set SMTP_PASSWORD in the Render dashboard (not here) to switch the
      # email notifier from dry-run to live. Left unset = safe dry-run.
      # (No effect while HELIOS_DEMO_MODE=1, since the notifier loop is disabled.)
